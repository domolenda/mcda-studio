name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-backend:
    runs-on: ubuntu-latest
    env:
      APP_TITLE: MCDA Studio
      APP_VERSION: 0.1.0
      FRONTEND_ORIGIN: http://127.0.0.1:5173
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync
        working-directory: backend
      - name: Run tests
        run: uv run pytest
        working-directory: backend

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
        working-directory: frontend
      - name: Run lint
        run: bun lint
        working-directory: frontend
      - name: Build
        run: bun run build
        working-directory: frontend

  build-docker:
    needs: [test-backend, lint-frontend]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: docker compose build
